<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Dominion Standard Logistics Ltd</title>
  <desc id="logoDesc">Shield emblem with globe and ribbon, company wordmark</desc>
  <defs>
    <linearGradient id="dsl-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e08a"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9a7b2c"/>
    </linearGradient>
    <linearGradient id="dsl-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
    <radialGradient id="dsl-globe" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f4d03f"/>
      <stop offset="55%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#7d6608"/>
    </radialGradient>
    <filter id="dsl-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Shield -->
  <path filter="url(#dsl-shadow)" fill="#0d0d0d" stroke="url(#dsl-gold)" stroke-width="3"
        d="M78 8 L118 22 L108 88 L78 104 L48 88 L38 22 Z"/>
  <!-- Globe -->
  <circle cx="78" cy="54" r="26" fill="url(#dsl-globe)"/>
  <ellipse cx="78" cy="54" rx="26" ry="9.5" fill="none" stroke="#5d4e0f" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="78" cy="54" rx="9.5" ry="26" fill="none" stroke="#5d4e0f" stroke-width="1.2" opacity="0.6"/>
  <path d="M52 54h52M78 28v52" stroke="#6b5908" stroke-width="1" opacity="0.45"/>
  <!-- Ribbon swoosh -->
  <path fill="url(#dsl-red)" d="M48 60 Q78 44 108 50 Q95 64 78 70 Q58 64 48 60Z" opacity="0.92"/>
  <path fill="url(#dsl-gold)" d="M52 56 Q78 42 104 48 Q92 60 78 66 Q60 60 52 56Z" opacity="0.85"/>
  <!-- Wordmark -->
  <text x="132" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="700" fill="url(#dsl-gold)" letter-spacing="0.06em">DOMINION STANDARD</text>
  <text x="132" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#f0f0f0" letter-spacing="0.32em">— LOGISTICS LTD —</text>
</svg>

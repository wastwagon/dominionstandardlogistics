server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/rss+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Orchestrator / load balancer probes (Coolify, Docker healthcheck, etc.)
    location = /health {
        default_type text/plain;
        access_log off;
        return 200 "ok\n";
    }

    # Vite build output — hashed filenames, safe to cache long-term
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Static files at site root (robots.txt, sitemap.xml, images)
    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location ~* \.(?:svg|ico|png|jpg|jpeg|gif|webp|woff2)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Avoid stale SPA shell after new deploys
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
